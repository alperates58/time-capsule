            - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
            - traefik.http.routers.http-0-qkjkf7bc79iyseqrrhyf3yn5-web.entryPoints=http
            - traefik.http.routers.http-0-qkjkf7bc79iyseqrrhyf3yn5-web.middlewares=redirect-to-https,crowdsec@file
            - 'traefik.http.routers.http-0-qkjkf7bc79iyseqrrhyf3yn5-web.rule=Host(`timecapsule.alperates.com.tr`)'
            - traefik.http.routers.https-0-qkjkf7bc79iyseqrrhyf3yn5-web.entryPoints=https
            - traefik.http.routers.https-0-qkjkf7bc79iyseqrrhyf3yn5-web.middlewares=gzip,crowdsec@file
