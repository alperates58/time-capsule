services:
    web:
        build:
            context: .
            dockerfile: Dockerfile
        command: sh -c "npx prisma db push --skip-generate && npx tsx prisma/seed.ts && node server.js"
        environment:
            NODE_ENV: production
            NEXT_PUBLIC_SITE_URL: 'https://timecapsule.alperates.com.tr'
            DATABASE_URL: 'postgresql://${POSTGRES_USER:-timecapsule}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-timecapsule}?schema=public'
            COOLIFY_BRANCH: '"main"'
            COOLIFY_RESOURCE_UUID: qkjkf7bc79iyseqrrhyf3yn5
            COOLIFY_CONTAINER_NAME: web-qkjkf7bc79iyseqrrhyf3yn5-181643241662
            SERVICE_URL_WEB: 'https://timecapsule.alperates.com.tr'
            SERVICE_FQDN_WEB: timecapsule.alperates.com.tr
            COOLIFY_URL: 'https://timecapsule.alperates.com.tr'
            COOLIFY_FQDN: timecapsule.alperates.com.tr
            SERVICE_NAME_WEB: web
            SERVICE_NAME_DB: db
        depends_on:
            db:
                condition: service_healthy
        restart: always
        container_name: web-qkjkf7bc79iyseqrrhyf3yn5-181643241662
        labels:
            - coolify.managed=true
            - coolify.version=4.0.0
            - coolify.applicationId=10
            - coolify.type=application
            - coolify.name=web-qkjkf7bc79iyseqrrhyf3yn5-181643241662
            - coolify.resourceName=time-capsule
            - coolify.projectName=timecapsule
            - coolify.serviceName=time-capsule
            - coolify.environmentName=production
            - coolify.pullRequestId=0
            - traefik.enable=true
